# Docker Compose for building from source (dev) — builds the image locally
services:
  nnoel:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Flush Python stdout/stderr immediately (no buffering)
      PYTHONUNBUFFERED: "1"
    volumes:
      - models_data:/app/models        # Persist downloaded models
      - ./data:/app/data               # Persist chat history (SQLite)
      - ./plugins:/app/plugins         # Co-located user plugins (backend + frontend halves)
    restart: unless-stopped

volumes:
  models_data:
