services:
  # Downloads the model if missing, then exits
  download-model:
    image: alpine:latest
    restart: "no"
    volumes:
      - ./models:/models
    environment:
      MODEL_URL: "${NNOEL_MODEL_URL:-https://huggingface.co/Qwen/Qwen3.5-4B-Instruct-GGUF/resolve/main/Qwen3.5-4B-Q4_K_M.gguf}"
      MODEL_FILE: "${NNOEL_MODEL_FILE:-Qwen3.5-4B-Q4_K_M.gguf}"
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl >/dev/null 2>&1
        FILE="/models/$MODEL_FILE"
        if [ -f "$FILE" ]; then
          echo "✓ $MODEL_FILE already exists"
          exit 0
        fi
        echo "Downloading $MODEL_FILE ..."
        curl -#L -o "$FILE" "$MODEL_URL"
        echo "✓ Done"

  # Nnoel web UI
  nnoel:
    build: .
    ports:
      - "${NNOEL_PORT:-5000}:5000"
    environment:
      NNOEL_HOST: "0.0.0.0"
      NNOEL_PORT: "5000"
      NNOEL_LLAMA_URL: "http://qwen3.5-0.8b:8080"
      NNOEL_LLAMA_API_KEY: "key"
      NNOEL_AGENT_NAME: "Nnoel"
    depends_on:
      qwen3.5-4b:
        condition: service_healthy
    restart: unless-stopped

  # llama.cpp server running main model
  qwen3.5-0.8b:
    image: ghcr.io/ggml-org/llama.cpp:server
    depends_on:
      download-model:
        condition: service_completed_successfully
    command: >
      --model /models/Qwen3.5-4B-Q4_K_M.gguf
      --api-key qwen354b
      --ctx-size 4096
      --chat-template-kwargs '{"enable_thinking":false}'
      --temperature 0.7
      --top-p 0.8
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --repeat-penalty 1.0
    ports:
      - "${LLAMACPP_PORT:-11435}:8080"
    volumes:
      - ./models:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped