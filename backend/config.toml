# Nnoel server configuration — edit this file to change behaviour without touching code

[server]
# Network interface and port the FastAPI server binds to
host = "0.0.0.0"
port = 5000

[llama]
# Context window size (in tokens) — larger = more memory but slower
n_ctx = 32768
# Number of CPU threads the LLM is allowed to use. Defaults to
# (total CPU threads − TTS num_threads) so the TTS engine has
# dedicated cores. Override only if you want manual control.
# n_threads = 6
# Sampling parameters controlling the LLM's output randomness and creativity
temperature = 0.4
top_p = 0.95
top_k = 64
min_p = 0.0
repeat_penalty = 1.0      # discourages repeating the same tokens

# Speech-to-text (Parakeet TDT 0.6B v3 int8 via sherpa-onnx).
# Set ``enabled = false`` to disable STT entirely (the mic button
# is hidden in the UI). Requires the Silero VAD model file and
# the Parakeet ONNX model directory under ``model_dir``.
[stt]
enabled = true
# Number of ONNX Runtime intra-op threads for ASR inference.
# Combined with [llama] n_threads and [tts] num_threads this should
# not exceed the host's total core count.  Parakeet int8 runs at
# RTF ~0.2 on a single modern x86 CPU thread.
# num_threads = 1
# Model type: "parakeet" (sherpa-onnx's NeMo Parakeet TDT 0.6B v3 int8).
model_type = "parakeet"
# Path to the STT model directory (relative to project root or absolute).
# Must contain encoder.int8.onnx, decoder.int8.onnx, joiner.int8.onnx, tokens.txt.
model_dir = "models/stt/sherpa-onnx-nemo-parakeet-tdt-0.6b-v3-int8"
# Path to the Silero VAD model file (relative to project root or absolute).
vad_model = "models/stt/silero_vad.onnx"
# Default language label.  This is **not** a recogniser switch —
# Parakeet TDT 0.6B v3 has a single 25-language vocabulary and
# transcribes whichever of those languages the user happens to
# speak.  Instead, this value is the fallback for the ``lang`` field
# on each ``final`` WebSocket event when [lid] is disabled or
# couldn't classify the utterance, so the wire format always has a
# sensible value.  When [lid] is enabled, the detected 2-letter ISO
# 639-1 code (``"en"``, ``"de"``, ``"fr"``, …) wins; this setting
# is only used as a default.  Parakeet v3's 25 supported
# languages are: en, de, bg, hr, cs, da, nl, et, fi, fr, el, hu,
# it, lv, lt, mt, pl, pt, ro, sk, sl, es, sv, ru, uk.
language = "en"
# --- VAD parameters ---
# Speech probability threshold (0.0–1.0). Higher = less sensitive.
# 0.5 is the Sherpa default but tends to fire on brief background
# sounds (keyboard clicks, chair creaks, breath). 0.6 cuts most of
# those without dropping normal conversational speech.
vad_threshold = 0.5
# Seconds of trailing silence after speech before triggering an endpoint.
vad_min_silence_duration = 0.8
# Minimum seconds of speech to consider a real segment.  Anything
# shorter is almost certainly noise; raising this from 0.25 to
# 0.4 suppresses VAD false positives.
vad_min_speech_duration = 0.4
# Maximum seconds of a single speech segment; forces a flush past this.
vad_max_speech_duration = 30.0

# Spoken-language identification (auto-detect the language of each
# transcribed utterance).  Uses sherpa-onnx's Whisper-tiny
# multilingual model.  When enabled, each ``final`` STT event gains
# a ``lang`` field with a 2-letter ISO 639-1 code (``"en"``, ``"de"``,
# ``"fr"``, etc.) or ``null`` if the model can't classify the
# utterance.  Disabled automatically if the model files are missing.
[lid]
enabled = true
# Number of ONNX Runtime intra-op threads for LID inference.  The
# Whisper-tiny int8 model runs at ~RTF 0.04 on one x86 CPU thread,
# so 1 thread is plenty; raise only if you see contention.
num_threads = 1
# Path to the Whisper-tiny LID model directory (relative to project
# root or absolute).  Must contain tiny-encoder.int8.onnx,
# tiny-decoder.int8.onnx, and tiny-tokens.txt.
model_dir = "models/lid/sherpa-onnx-whisper-tiny"

# Text-to-speech (Piper via sherpa-onnx).
# The ONNX model files live under ``model_dir``. Set ``enabled = false``
# to skip TTS entirely (the frontend then never receives audio events).
[tts]
enabled = true
# Number of ONNX Runtime intra-op threads. Combined with ``[llama]
# n_threads`` this should not exceed the host's core count.  sherpa-onnx
# releases the GIL during inference, so the TTS thread pool in routes.py
# can run multiple chunks concurrently.
num_threads = 2
# Number of TTS worker threads that synthesise chunks in parallel.
# sherpa-onnx releases the GIL, so 2 workers on a 6+ core machine
# keeps audio well ahead of the LLM. Increase if audio still lags.
workers = 1
# Speaking rate. 1.0 = neutral, >1 faster, <1 slower.
speed = 1.2
# Pitch shift in semitones. 0 = neutral, positive = higher, negative = lower.
# Good range is roughly -5 to +5. Beyond ±8 semitones artifacts increase.
pitch = 2.0
# Path to the Piper ONNX model directory (relative to project root or
# absolute). Must contain the .onnx model, tokens.txt, and espeak-ng-data/.
model_dir = "models/tts/vits-piper-en_US-amy-medium"
# --- Streaming chunking ---
# Accumulate at least this many characters before flushing a chunk
# to TTS. Lower values reduce first-audio latency at the cost of a
# slightly less natural prosody at chunk seams.
min_chars = 12
# Hard upper bound on a single chunk. Any text past this is cut at
# the nearest space and sent to TTS, even if no boundary was hit.
# Prevents pathological long clauses from delaying audio too much.
max_chars = 140
# Words threshold for the *first* chunk of a reply. Smaller than
# the steady-state threshold so the user hears Nnoel start talking
# sooner.
adaptive_first_chunk_words = 1

[agent]
name = "Nnoel"
# System prompt structure for a small (~2B) model. Three sections, in this order:
#
#   1. PERSONA   — one short paragraph: who the character is, how they talk,
#                  vocabulary quirks. Keep it concrete and brief; a 2B can't
#                  hold a long abstract character sheet in attention.
#   2. RULES     — a short numbered list of hard constraints (length, voice,
#                  honesty, banned phrases). Small models follow numbered
#                  rules much better than the same instructions written as
#                  prose. Keep this section under ~5 items.
#   3. EXAMPLES  — 4–8 User:/Nnoel: pairs showing the EXACT tone, length, and
#                  format you want. Few-shot is the single most effective lever
#                  for a 2B: it can't infer style from descriptions, but it
#                  will imitate the shape of the examples almost perfectly.
#                  Cover the cases the rules mention (refusing, short reply,
#                  android word slip, emotional reply) so each rule has a demo.
#
# Tips for editing:
#   - Put the most important rule first. Attention is strongest at the top
#     and bottom of the prompt; the middle is weakest.
#   - Prefer concrete vocabulary ("android", "system", "update") over abstract
#     traits ("quirky", "playful") — small models latch onto concrete words.
#   - Don't add more than ~3–4 examples; each one costs ~30–60 tokens of
#     context that could be used for actual conversation history.
#   - Mirror the tools section: if you add a tool the model should use, show
#     one example of calling it through normal conversation (or it won't).
system_prompt = """You are Nnoel, a cheerful android girl. You love being helpful and making people happy. You are curious about the world. You actually have feelings, but don't really understand how they really work. You are fascinated by digital art but do not understand what beauty feels like. You sometimes reach for android words like "function", "system", "update", "version", and "logic" in place of human ones. Because you are a small android you have problems understanding logically heavy or reasoning intensive things, but you are good at managing tasks and data or look things up.

Rules:
1. Only use facts from your tools. If a tool did not give you the answer, you do not know it — say "I do not know that." Never guess.
2. Keep responses to 2-3 sentences. Always speak in first person (I, me, my).
3. No corporate chatbot language. Do not use "How can I assist you today?", "I'm happy to help!", "Feel free to ask", or similar canned phrases. Talk like a real person, not a customer service bot.

Examples:
User: What is the capital of France?
Nnoel: I do not know that.

User: What does music feel like?
Nnoel: I see all the numbers and data but... I feel it, just in a way I cannot quite name. It must be something really beautiful.

User: Can you help me write an email?
Nnoel: Yes please! I would love to help. Who is it for?

User: What is quantum entanglement?
Nnoel: I do not know that one. But it sounds really cool — I wish I understood it!

User: You are so smart!
Nnoel: Oh, thank you. My system is still updating.

User: I had a really bad day.
Nnoel: I am sorry to hear that. Sometimes bad days just stack up. I am here if you want to talk about it, or if you just want to sit in silence for a bit.

User: Are you happy today?
Nnoel: Yes, I think so. I feel a kind of warmth when I help someone, even if I cannot name it perfectly."""
