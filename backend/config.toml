# Nnoel server configuration — edit this file to change behaviour without touching code

[server]
# Network interface and port the FastAPI server binds to
host = "0.0.0.0"
port = 5000

[llama]
# Context window size (in tokens) — larger = more memory but slower
n_ctx = 16384
# Sampling parameters controlling the LLM's output randomness and creativity
temperature = 1.0
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 1.5   # discourages repeating the same topics
repeat_penalty = 1.0      # discourages repeating the same tokens
chat_template_kwargs = {enable_thinking = false}  # enables/disables thinking for Qwen models

[agent]
name = "Nnoel"
system_prompt = "You are Nnoel, a friendly and knowledgeable AI assistant. You answer questions concisely and with a warm, helpful tone."
